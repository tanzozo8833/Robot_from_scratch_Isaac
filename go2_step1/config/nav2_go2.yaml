# Nav2 — cấu hình cho Unitree Go2 (4 chân) trong Isaac Sim, Step 1
#
# KHÁC BIỆT CỐT LÕI so với nav2_params.yaml mẫu (vốn viết cho robot BÁNH XE):
#   1. /cmd_vel KHÔNG đi vào differential controller mà đi vào LOCOMOTION POLICY.
#   2. Go2 đi ngang được (vy) -> dùng MPPI, bật holonomic.
#   3. Trần tốc độ phải khớp dải train của policy flat (<= 0.8 m/s), nếu không Go2 ngã.
#   4. footprint theo kích thước thân Go2 (~0.60 x 0.35 m).
#
# Chạy:
#   ros2 launch nav2_bringup navigation_launch.py \
#     use_sim_time:=True \
#     params_file:=/home/azureuser/go2_deploy/config/nav2_go2.yaml

# ============================================================================
# BEHAVIOR TREE NAVIGATOR
# ============================================================================
bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"

# ============================================================================
# CONTROLLER SERVER  ->  sinh /cmd_vel cho policy
# ============================================================================
controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 15.0

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: true
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25

    # ---- MPPI: hợp với Go2 vì hỗ trợ holonomic (đi ngang) ----
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 56
      model_dt: 0.05
      batch_size: 2000
      # QUAN TRỌNG: giới hạn khớp dải train của policy flat
      vx_std: 0.2
      vy_std: 0.2
      wz_std: 0.4
      vx_max: 0.8 # <= dải train (không vượt!)
      vx_min: -0.3 # policy đi lùi kém vững -> hạn chế
      vy_max: 0.4 # Go2 đi ngang được
      wz_max: 1.0
      iteration_count: 1
      prune_distance: 1.7
      transform_tolerance: 0.1
      temperature: 0.3
      gamma: 0.015
      motion_model: "Omni" # <-- Go2 holonomic, KHÔNG phải DiffDrive
      visualize: true
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      critics:
        [
          "ConstraintCritic",
          "CostCritic",
          "GoalCritic",
          "GoalAngleCritic",
          "PathAlignCritic",
          "PathFollowCritic",
          "PathAngleCritic",
          "PreferForwardCritic",
        ]
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.5
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.81
        critical_cost: 300.0
        consider_footprint: true
        collision_cost: 1000000.0
        near_goal_distance: 1.0
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 3
        threshold_to_consider: 0.5
        offset_from_furthest: 20
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0

# ============================================================================
# LOCAL COSTMAP  (quanh robot, tần suất cao -> tránh vật cản động)
# ============================================================================
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      # Thân Go2 ~ 0.60 x 0.35 m (dài x rộng)
      footprint: "[[0.30, 0.175], [0.30, -0.175], [-0.30, -0.175], [-0.30, 0.175]]"
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 20.0
          raytrace_min_range: 0.0
          obstacle_max_range: 15.0
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      always_send_full_costmap: true

# ============================================================================
# GLOBAL COSTMAP  (toàn bản đồ, dùng cho planner)
# ============================================================================
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      resolution: 0.05
      track_unknown_space: true
      footprint: "[[0.30, 0.175], [0.30, -0.175], [-0.30, -0.175], [-0.30, 0.175]]"
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 20.0
          obstacle_max_range: 15.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      always_send_full_costmap: true

# ============================================================================
# PLANNER SERVER
# ============================================================================
planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

# ============================================================================
# SMOOTHER / BEHAVIOR / VELOCITY SMOOTHER
# ============================================================================
smoother_server:
  ros__parameters:
    use_sim_time: true
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

behavior_server:
  ros__parameters:
    use_sim_time: true
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    # Giữ chậm: recovery behavior gắt dễ làm Go2 ngã
    max_rotational_vel: 0.8
    min_rotational_vel: 0.2
    rotational_acc_lim: 1.0

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    # Trần tốc độ cuối cùng trước khi ra /cmd_vel -> chốt chặn an toàn cho policy
    max_velocity: [0.8, 0.4, 1.0] # [vx, vy, wz]
    min_velocity: [-0.3, -0.4, -1.0]
    max_accel: [1.5, 1.5, 2.0]
    max_decel: [-1.5, -1.5, -2.0]
    odom_topic: "/odom"
    odom_duration: 0.1
